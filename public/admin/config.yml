backend:
  name: github
  repo: Parkerhiphop/my-site
  branch: main
  base_url: YOUR_CF_WORKER_URL

media_folder: public/images/uploads
public_folder: /images/uploads
publish_mode: editorial_workflow

i18n:
  structure: multiple_files
  locales: [zh-TW, en, ja]
  default_locale: zh-TW

collections:
  - name: life
    label: Life
    folder: data/life
    create: true
    nested:
      depth: 10
    path: "{{slug}}/{{locale}}"
    extension: md
    format: frontmatter
    i18n: true
    fields: &post_fields
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Date, name: date, widget: datetime, i18n: duplicate }
      - { label: Draft, name: draft, widget: boolean, default: false, i18n: duplicate }
      - { label: Summary, name: summary, widget: text, required: false, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }
  - name: software
    label: Software
    folder: data/software
    create: true
    nested:
      depth: 10
    path: "{{slug}}/{{locale}}"
    extension: md
    format: frontmatter
    i18n: true
    fields: *post_fields
  - name: thoughts
    label: Thoughts
    folder: data/thoughts
    create: true
    nested:
      depth: 10
    path: "{{category}}/{{slug}}/{{locale}}"
    extension: md
    format: frontmatter
    i18n: true
    fields:
      - label: Category
        name: category
        widget: select
        options: [manga, anime, movie, series, novel, tools]
        i18n: duplicate
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Date, name: date, widget: datetime, i18n: duplicate }
      - { label: Draft, name: draft, widget: boolean, default: false, i18n: duplicate }
      - { label: Summary, name: summary, widget: text, required: false, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }
  - name: novel
    label: Novel
    folder: data/novel
    create: true
    nested:
      depth: 10
    path: "{{slug}}/{{locale}}"
    extension: md
    format: frontmatter
    i18n: true
    fields: *post_fields
